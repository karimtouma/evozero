version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    # Docs build from ./src (see docs/conf.py); torch is mocked, so we install
    # only the lightweight doc toolchain — no GPU/torch download on Read the Docs.
    - pip install uv
    - uv pip install --system numpy sphinx myst-parser sphinx-design pydata-sphinx-theme sphinx-autodoc-typehints
    - sphinx-build -b html docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
